# ============================================================
# azure-pipelines.yml
# Dummy CI + CD Pipeline using three step templates
# ============================================================

trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main

variables:
  buildConfiguration: 'Release'
  appName: 'my-dummy-app'
  environment: 'staging'

stages:

  # ──────────────────────────────────────────────
  # STAGE 1: Build (CI)
  # ──────────────────────────────────────────────
  - stage: Build
    displayName: '🔨 Build Stage'
    jobs:
      - job: BuildJob
        displayName: 'Build Application'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          # Template 1: Build steps
          - template: templates/build-steps.yml
            parameters:
              buildConfiguration: $(buildConfiguration)
              appName: $(appName)

  # ──────────────────────────────────────────────
  # STAGE 2: Test (CI)
  # ──────────────────────────────────────────────
  - stage: Test
    displayName: '🧪 Test Stage'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: TestJob
        displayName: 'Run Tests'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          # Template 2: Test steps
          - template: templates/test-steps.yml
            parameters:
              appName: $(appName)
              runIntegrationTests: true

  # ──────────────────────────────────────────────
  # STAGE 3: Deploy (CD)
  # ──────────────────────────────────────────────
  - stage: Deploy
    displayName: '🚀 Deploy Stage'
    dependsOn: Test
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployJob
        displayName: 'Deploy to Staging'
        pool:
          vmImage: 'ubuntu-latest'
        environment: $(environment)
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                # Template 3: Deploy steps
                - template: templates/deploy-steps.yml
                  parameters:
                    appName: $(appName)
                    environment: $(environment)
                    region: 'uk-south'
