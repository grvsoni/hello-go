pipeline:
  name: AnsibleTSC
  identifier: ansibletsc
  projectIdentifier: flaskcounter
  orgIdentifier: default
  description: ''
  tags: {}
  stages:
  - stage:
      name: ServiceEdge-TEAM01
      identifier: ServiceEdge_TEAM01
      description: 'Bamboo env: ServiceEdge-TEAM01'
      template:
        templateRef: account.AWX_Deploy
        versionLabel: '1.1'
        templateInputs:
          type: Deployment
          spec:
            service:
              serviceRef: <+input>
              serviceInputs: <+input>
            execution:
              steps:
              - stepGroup:
                  identifier: AWX_Deployment
                  template:
                    templateInputs:
                      variables:
                      - name: Git
                        type: String
                        default: GitHub
                        value: <+input>.default(GitHub).allowedValues(GitHub,Stash)
          variables:
          - name: BUILD_NUMBER
            type: String
            value: <+input>
          - name: Env_Name
            type: String
            value: <+input>
          - name: Infra_Name
            type: String
            value: Prod1
          - name: Repo_Branch_Name
            type: String
            value: <+input>
          - name: Deployment_Env_File
            type: String
            value: 'true'
  - stage:
      name: ServiceEdge-TEAM02
      identifier: ServiceEdge_TEAM02
      description: 'Bamboo env: ServiceEdge-TEAM02'
      template:
        templateRef: account.AWX_Deploy
        versionLabel: '1.1'
        templateInputs:
          type: Deployment
          spec:
            service:
              serviceRef: <+input>
              serviceInputs: <+input>
            execution:
              steps:
              - stepGroup:
                  identifier: AWX_Deployment
                  template:
                    templateInputs:
                      variables:
                      - name: Git
                        type: String
                        default: GitHub
                        value: <+input>.default(GitHub).allowedValues(GitHub,Stash)
          variables:
          - name: BUILD_NUMBER
            type: String
            value: <+input>
          - name: Env_Name
            type: String
            value: <+input>
          - name: Infra_Name
            type: String
            value: '0'
          - name: Repo_Branch_Name
            type: String
            value: '1'
          - name: Deployment_Env_File
            type: String
            value: <+input>
  - stage:
      name: ServiceEdge-TEAM05
      identifier: ServiceEdge_TEAM05
      description: 'Bamboo env: ServiceEdge-TEAM05'
      template:
        templateRef: account.AWX_Deploy
        versionLabel: '1.1'
        templateInputs:
          type: Deployment
          spec:
            service:
              serviceRef: <+input>
              serviceInputs: <+input>
            execution:
              steps:
              - stepGroup:
                  identifier: AWX_Deployment
                  template:
                    templateInputs:
                      variables:
                      - name: Git
                        type: String
                        default: GitHub
                        value: <+input>.default(GitHub).allowedValues(GitHub,Stash)
          variables:
          - name: BUILD_NUMBER
            type: String
            value: <+input>
          - name: Env_Name
            type: String
            value: <+input>
          - name: Infra_Name
            type: String
            value: '0'
          - name: Repo_Branch_Name
            type: String
            value: <+input>
          - name: Deployment_Env_File
            type: String
            value: <+input>
